# Punter VICE interop harness — gateway config template.
# start-gateway.sh copies this into run/egateway.conf on first launch (the
# gateway rewrites that copy to its full canonical form, so we keep the
# pristine template here). Any key not listed falls back to the built-in
# default.
#
# Headless (no GUI window), telnet only, security off, verbose on so the
# per-block Punter protocol trace is printed to stderr during a transfer.

enable_console = false
telnet_enabled = true
telnet_port = 2323
security_enabled = false
transfer_dir = transfer
verbose = true

# Keep the other services off so nothing competes for ports with a gateway
# you may already be running elsewhere.
ssh_enabled = false
web_enabled = false
serial_a_enabled = false
serial_b_enabled = false

# Punter tunables (same as the shipped defaults; edit to experiment).
punter_block_size = 255
punter_negotiation_timeout = 45
punter_block_timeout = 20
punter_max_retries = 10
punter_negotiation_retry_interval = 5
