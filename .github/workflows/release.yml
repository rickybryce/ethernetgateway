name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Allow manual triggering (e.g. to re-run for a tag that already exists).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.3)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build binaries on each target platform ──────────────
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            appimage_arch: x86_64
          # Native arm64 Linux runner — produces the Raspberry Pi 4+ build.
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            appimage_arch: aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            pkg-config \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libwayland-dev \
            libfontconfig1-dev

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          NAME="ethernetgateway-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp "target/${{ matrix.target }}/release/ethernetgateway" "dist/${NAME}/"
          cp README.md LICENSE "dist/${NAME}/" 2>/dev/null || true
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
          echo "ARTIFACT=dist/${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "ethernetgateway-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist\$name" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\ethernetgateway.exe" "dist\$name\"
          if (Test-Path "README.md") { Copy-Item "README.md" "dist\$name\" }
          if (Test-Path "LICENSE")   { Copy-Item "LICENSE"   "dist\$name\" }
          Compress-Archive -Path "dist\$name\*" -DestinationPath "dist\$name.zip"
          Add-Content -Path $env:GITHUB_ENV -Value "ARTIFACT=dist\$name.zip"

      # ─── AppImage (Linux only) ─────────────────────────────
      # Bundles the same release binary the tar.gz ships, so users who
      # prefer an integrated AppImage launcher don't need to reach for
      # the tar.gz + system-wide install.  Runs on each Linux build slot
      # (x86_64 and aarch64) because AppImage is a Linux-only container
      # format; the arch is taken from matrix.appimage_arch.
      - name: Build AppImage
        if: matrix.appimage_arch != ''
        shell: bash
        run: |
          set -euo pipefail
          ARCH="${{ matrix.appimage_arch }}"
          # appimagetool is a self-contained AppImage; GitHub runners
          # lack FUSE, so extract it and invoke AppRun directly.  Each
          # arch has its own appimagetool build with a matching runtime.
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${ARCH}.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract >/dev/null
          mkdir -p AppDir/usr/bin
          cp target/${{ matrix.target }}/release/ethernetgateway AppDir/usr/bin/
          cp web/ethernetgatewaylogo.png AppDir/ethernetgateway.png
          cat > AppDir/ethernetgateway.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Ethernet Gateway
          Comment=Telnet/SSH gateway and Hayes AT modem emulator for retro terminals
          Exec=ethernetgateway
          Icon=ethernetgateway
          Categories=Network;Utility;
          Terminal=false
          EOF
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/ethernetgateway" "$@"
          EOF
          chmod +x AppDir/AppRun
          ARCH="${ARCH}" ./squashfs-root/AppRun AppDir "dist/Ethernet_Gateway-${ARCH}.AppImage"
          echo "APPIMAGE=dist/Ethernet_Gateway-${ARCH}.AppImage" >> "$GITHUB_ENV"

      - name: SHA-256 checksum
        shell: bash
        run: |
          sha() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" > "$1.sha256"
            else
              # macOS / Windows (git-bash): shasum is present on both.
              shasum -a 256 "$1" > "$1.sha256"
            fi
          }
          sha "${ARTIFACT}"
          if [ -n "${APPIMAGE:-}" ] && [ -f "${APPIMAGE}" ]; then
            sha "${APPIMAGE}"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
            dist/*.AppImage
            dist/*.AppImage.sha256
          if-no-files-found: error

  # ─── Sign and publish a GitHub Release ───────────────────
  release:
    name: sign & publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # needed for sigstore/cosign keyless signing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed so CHANGELOG.md is present

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      # ─── GPG sign (requires GPG_PRIVATE_KEY secret) ─────
      # If the secret is not configured, the step is skipped — the
      # release still publishes with SHA-256 checksums, just no .asc
      # files.  Set GPG_PRIVATE_KEY (ASCII-armored) in repo Settings →
      # Secrets → Actions to enable GPG signing.
      - name: Import GPG key
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "GPG_AVAILABLE=1" >> "$GITHUB_ENV"

      - name: GPG-sign artifacts
        if: env.GPG_AVAILABLE == '1'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd dist
          for f in ethernetgateway-*.tar.gz ethernetgateway-*.zip Ethernet_Gateway-*.AppImage; do
            [ -f "$f" ] || continue
            if [ -n "${GPG_PASSPHRASE}" ]; then
              echo "${GPG_PASSPHRASE}" | gpg --batch --yes --pinentry-mode loopback \
                --passphrase-fd 0 --armor --detach-sign "$f"
            else
              gpg --batch --yes --armor --detach-sign "$f"
            fi
          done
          ls -la

      # ─── Sigstore keyless signing (always runs, no secrets needed) ─
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sigstore-sign artifacts
        run: |
          cd dist
          for f in ethernetgateway-*.tar.gz ethernetgateway-*.zip Ethernet_Gateway-*.AppImage; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" "$f"
          done
          ls -la

      # ─── Publish the GitHub Release ─────────────────────
      - name: Extract changelog section for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VERSION="${TAG#v}"
          # Pull the `## [VERSION]` block out of CHANGELOG.md, stopping at
          # the next `## ` heading.  Empty string if not found.
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}." > release_notes.md
          fi
          echo "notes_path=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "ethernetgateway ${{ github.ref_name || github.event.inputs.tag }}"
          body_path: ${{ steps.changelog.outputs.notes_path }}
          draft: false
          prerelease: false
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.AppImage
            dist/*.sha256
            dist/*.asc
            dist/*.sig
            dist/*.pem
          fail_on_unmatched_files: false
